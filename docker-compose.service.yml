services:
  rag-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/app.db
      VECTOR_STORE: ${VECTOR_STORE:-qdrant}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_chunks}
    expose:
      - "8080"
    volumes:
      - rag_data:/app/data
    networks:
      - lex-advisor
    restart: unless-stopped

volumes:
  rag_data:

networks:
  lex-advisor:
    external: true